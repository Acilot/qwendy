<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLOps Platform - Model Inference</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-healthy {
            background: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
        }
        
        .status-unhealthy {
            background: #f44336;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .result-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            border-left: 4px solid #667eea;
        }
        
        .result-box.success {
            border-left-color: #4CAF50;
        }
        
        .result-box.error {
            border-left-color: #f44336;
        }
        
        .result-box pre {
            background: white;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 13px;
            margin-top: 10px;
        }
        
        .model-list {
            list-style: none;
        }
        
        .model-item {
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        
        .model-item:hover {
            border-color: #667eea;
            background: #f8f9fa;
        }
        
        .model-item.active {
            border-color: #667eea;
            background: #f0f3ff;
        }
        
        .model-version {
            font-weight: 600;
            color: #333;
        }
        
        .model-accuracy {
            color: #4CAF50;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .model-type {
            color: #666;
            font-size: 0.85em;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .info-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }
        
        .info-label {
            font-size: 0.85em;
            color: #666;
        }
        
        .info-value {
            font-weight: 600;
            color: #333;
            margin-top: 3px;
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 MLOps Platform</h1>
            <p>Model Training, Deployment & Inference Dashboard</p>
        </header>
        
        <div class="dashboard">
            <!-- Service Status -->
            <div class="card">
                <h2>Service Status</h2>
                <div id="status-content">
                    <p><span class="status-indicator" id="status-dot"></span><span id="status-text">Checking...</span></p>
                    <div class="info-grid" style="margin-top: 15px;">
                        <div class="info-item">
                            <div class="info-label">Models Available</div>
                            <div class="info-value" id="models-count">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Current Model</div>
                            <div class="info-value" id="current-model">-</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Model Info -->
            <div class="card">
                <h2>Current Model Info</h2>
                <div id="model-info-content">
                    <p>Loading...</p>
                </div>
            </div>
            
            <!-- Make Prediction -->
            <div class="card">
                <h2>Make Prediction</h2>
                <form id="prediction-form">
                    <div class="features-grid">
                        <div class="form-group">
                            <label>Feature 1</label>
                            <input type="number" step="0.01" name="f1" value="0.5" required>
                        </div>
                        <div class="form-group">
                            <label>Feature 2</label>
                            <input type="number" step="0.01" name="f2" value="-0.3" required>
                        </div>
                        <div class="form-group">
                            <label>Feature 3</label>
                            <input type="number" step="0.01" name="f3" value="0.1" required>
                        </div>
                        <div class="form-group">
                            <label>Feature 4</label>
                            <input type="number" step="0.01" name="f4" value="0.8" required>
                        </div>
                        <div class="form-group">
                            <label>Feature 5</label>
                            <input type="number" step="0.01" name="f5" value="-0.2" required>
                        </div>
                        <div class="form-group">
                            <label>Feature 6</label>
                            <input type="number" step="0.01" name="f6" value="0.4" required>
                        </div>
                        <div class="form-group">
                            <label>Feature 7</label>
                            <input type="number" step="0.01" name="f7" value="-0.6" required>
                        </div>
                        <div class="form-group">
                            <label>Feature 8</label>
                            <input type="number" step="0.01" name="f8" value="0.9" required>
                        </div>
                        <div class="form-group">
                            <label>Feature 9</label>
                            <input type="number" step="0.01" name="f9" value="-0.1" required>
                        </div>
                        <div class="form-group">
                            <label>Feature 10</label>
                            <input type="number" step="0.01" name="f10" value="0.3" required>
                        </div>
                    </div>
                    <button type="submit" class="btn" id="predict-btn">🔮 Get Prediction</button>
                </form>
                <div id="prediction-result"></div>
            </div>
            
            <!-- Available Models -->
            <div class="card">
                <h2>Available Models</h2>
                <div id="models-list-content">
                    <p>Loading...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        
        // Check service health
        async function checkHealth() {
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                const data = await response.json();
                
                document.getElementById('status-dot').className = 'status-indicator status-healthy';
                document.getElementById('status-text').textContent = 'Service Healthy';
                
                // Get models count
                const modelsResponse = await fetch(`${API_BASE}/api/models`);
                const modelsData = await modelsResponse.json();
                if (modelsData.success) {
                    document.getElementById('models-count').textContent = modelsData.count;
                }
                
                // Get current model info
                await getModelInfo();
                await loadModelsList();
            } catch (error) {
                document.getElementById('status-dot').className = 'status-indicator status-unhealthy';
                document.getElementById('status-text').textContent = 'Service Unavailable';
                console.error('Health check failed:', error);
            }
        }
        
        // Get model info
        async function getModelInfo() {
            try {
                const response = await fetch(`${API_BASE}/api/model/info`);
                const data = await response.json();
                
                if (data.success) {
                    const info = data.model_info;
                    document.getElementById('current-model').textContent = info.model_type || 'N/A';
                    
                    document.getElementById('model-info-content').innerHTML = `
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-label">Model Type</div>
                                <div class="info-value">${info.model_type || 'N/A'}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Accuracy</div>
                                <div class="info-value">${(info.accuracy * 100).toFixed(2)}%</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Features</div>
                                <div class="info-value">${info.n_features || 'N/A'}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Trained At</div>
                                <div class="info-value">${info.trained_at ? new Date(info.trained_at).toLocaleString() : 'N/A'}</div>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('model-info-content').innerHTML = '<p style="color: #f44336;">Failed to load model info</p>';
            }
        }
        
        // Load models list
        async function loadModelsList() {
            try {
                const response = await fetch(`${API_BASE}/api/models`);
                const data = await response.json();
                
                if (data.success && data.models.length > 0) {
                    let html = '<ul class="model-list">';
                    data.models.forEach((model, index) => {
                        html += `
                            <li class="model-item ${index === 0 ? 'active' : ''}">
                                <div class="model-version">v${model.version}</div>
                                <div class="model-accuracy">Accuracy: ${(model.accuracy * 100).toFixed(2)}%</div>
                                <div class="model-type">${model.model_type}</div>
                                <div class="model-type">Trained: ${new Date(model.trained_at).toLocaleString()}</div>
                            </li>
                        `;
                    });
                    html += '</ul>';
                    document.getElementById('models-list-content').innerHTML = html;
                } else {
                    document.getElementById('models-list-content').innerHTML = '<p>No models available</p>';
                }
            } catch (error) {
                document.getElementById('models-list-content').innerHTML = '<p style="color: #f44336;">Failed to load models</p>';
            }
        }
        
        // Make prediction
        document.getElementById('prediction-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('predict-btn');
            const originalText = btn.textContent;
            btn.textContent = '⏳ Processing...';
            btn.disabled = true;
            
            const formData = new FormData(e.target);
            const features = [
                parseFloat(formData.get('f1')),
                parseFloat(formData.get('f2')),
                parseFloat(formData.get('f3')),
                parseFloat(formData.get('f4')),
                parseFloat(formData.get('f5')),
                parseFloat(formData.get('f6')),
                parseFloat(formData.get('f7')),
                parseFloat(formData.get('f8')),
                parseFloat(formData.get('f9')),
                parseFloat(formData.get('f10'))
            ];
            
            try {
                const response = await fetch(`${API_BASE}/api/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ features })
                });
                
                const data = await response.json();
                const resultDiv = document.getElementById('prediction-result');
                
                if (data.success) {
                    resultDiv.className = 'result-box success';
                    resultDiv.innerHTML = `
                        <h3 style="margin-bottom: 10px;">Prediction Result</h3>
                        <p><strong>Predicted Class:</strong> ${data.result.prediction}</p>
                        <p><strong>Confidence:</strong> ${(Math.max(data.result.probabilities.class_0, data.result.probabilities.class_1) * 100).toFixed(2)}%</p>
                        <pre>${JSON.stringify(data.result, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.className = 'result-box error';
                    resultDiv.innerHTML = `<p style="color: #f44336;">Error: ${data.error}</p>`;
                }
            } catch (error) {
                const resultDiv = document.getElementById('prediction-result');
                resultDiv.className = 'result-box error';
                resultDiv.innerHTML = `<p style="color: #f44336;">Error: ${error.message}</p>`;
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
        
        // Initialize
        checkHealth();
        setInterval(checkHealth, 30000); // Refresh every 30 seconds
    </script>
</body>
</html>
