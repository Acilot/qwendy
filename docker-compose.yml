version: '3.8'

services:
  backend:
    build: ./backend
    container_name: mlops-backend
    volumes:
      - ./models:/workspace/models
      - ./hdfs_storage:/workspace/hdfs_storage
      - ./pipelines:/workspace/pipelines
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: mlops-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  models_data:
  hdfs_data:
  pipelines_data:
