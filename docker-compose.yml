version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: mlops-postgres
    environment:
      POSTGRES_DB: mlops
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops_secure_password_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlops -d mlops"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlops-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mlops-backend
    environment:
      DATABASE_URL: postgresql://mlops:mlops_secure_password_2024@postgres:5432/mlops
      SECRET_KEY: ${SECRET_KEY:-mlops-secret-key-change-in-production}
      MODELS_DIR: /workspace/models
      DATA_DIR: /workspace/data
      # HDFS disabled by default - use local storage
      # For real HDFS: set HDFS_URL to your cluster address
      HDFS_URL: ""
      HDFS_USER: mlops
    volumes:
      - ./models:/workspace/models
      - ./data:/workspace/data
      - ./hdfs_storage:/workspace/hdfs_storage
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mlops-network
    # GPU support (uncomment for NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mlops-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - mlops-network

networks:
  mlops-network:
    driver: bridge

volumes:
  postgres_data:
