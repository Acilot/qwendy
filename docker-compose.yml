version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: mlops-postgres
    environment:
      POSTGRES_DB: mlops
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops_secure_password_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlops -d mlops"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlops-network

  # HDFS NameNode + DataNode (working image)
  hdfs:
    image: apache/hadoop:3.3.6
    container_name: mlops-hdfs
    hostname: hdfs
    environment:
      - CLUSTER_NAME=mlops
      - HDFS_REPLICATION=1
    volumes:
      - hdfs_namenode:/hadoop/dfs/name
      - hdfs_datadatanode:/hadoop/dfs/data
      - ./hdfs_storage:/hadoop/dfs/data/import
    ports:
      - "9000:9000"
      - "9870:9870"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - mlops-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mlops-backend
    environment:
      DATABASE_URL: postgresql://mlops:mlops_secure_password_2024@postgres:5432/mlops
      SECRET_KEY: ${SECRET_KEY:-mlops-secret-key-change-in-production}
      MODELS_DIR: /workspace/models
      DATA_DIR: /workspace/data
      HDFS_URL: hdfs://hdfs:9000
      HDFS_USER: root
    volumes:
      - ./models:/workspace/models
      - ./data:/workspace/data
      - ./hdfs_storage:/workspace/hdfs_storage
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      hdfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mlops-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mlops-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - mlops-network

networks:
  mlops-network:
    driver: bridge

volumes:
  postgres_data:
  hdfs_namenode:
  hdfs_datadatanode:
